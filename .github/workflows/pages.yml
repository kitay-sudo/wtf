# Pages — собирает статический лендинг и публикует через GitHub Pages.
#
# Триггер: push в main (только если изменился frontend/), плюс ручной запуск.
# Перед первым запуском нужно один раз вручную:
#   Settings → Pages → Build and deployment → Source: GitHub Actions

name: pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build static site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Pages обслуживает проектный сайт по https://<user>.github.io/<repo>/
          # — ассеты должны ссылаться оттуда же.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
